services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobpilot-backend
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/resume.txt:/app/resume.txt:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "-u", "${DASHBOARD_USERNAME:-admin}:${DASHBOARD_PASSWORD:-jobpilot}", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8001
        - NEXT_PUBLIC_API_USERNAME=${DASHBOARD_USERNAME:-admin}
        - NEXT_PUBLIC_API_PASSWORD=${DASHBOARD_PASSWORD:-jobpilot}
    container_name: jobpilot-frontend
    ports:
      - "3001:3001"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
